# Supabase local development config — SmarkStock
# Owned by migration agent 0001. Standard local ports.

project_id = "smarkstock"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324

[storage]
# All file uploads go to Cloudflare R2 (bucket smarkstock-files), never Supabase storage.
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Owner creates all accounts in Settings — no self-signup anywhere (FEATURES.md §2).
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
# Usernames map to synthetic emails {username}@smark.internal — no real mail flows.
#
# `enable_signup` here is NOT "block self-signup" (that's `[auth].enable_signup`
# above, which correctly maps to GOTRUE_DISABLE_SIGNUP and already blocks it) —
# the Supabase CLI wires THIS key straight to GOTRUE_EXTERNAL_EMAIL_ENABLED
# (apps/cli-go/internal/start/start.go), i.e. it's really "is the email
# provider on at all". Setting it to `false` — as this file did before —
# disables email/password login entirely, not just signup: every
# `signInWithPassword` 422s with `email_provider_disabled`, which is exactly
# why the e2e login helper (fills the form, clicks Log in, waits for
# /dashboard) timed out on a freshly reset local stack. Keep this `true`;
# `[auth].enable_signup = false` above is what actually stops self-signup.
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[realtime]
enabled = true

[analytics]
enabled = false
