name: CI

# R2-29 quality gate (plan/TESTING.md §7): "Green build = deployable; red
# blocks." No manual test steps — everything a human would click is a
# Playwright script, everything else is bun test. See docs/DEV.md for the
# local-dev equivalent of every step below and the branch-protection note
# that makes this gate actually deploy-blocking.
#
# Pipeline shape (plan/TESTING.md §7, scoped to what's buildable today —
# local Supabase + local dev server, not yet a Vercel preview + branch DB):
#   checks + integration            → fast, parallel, always
#   build  (needs checks+integration)
#   playwright (needs build)        → desktop-1280 + mobile-360
#   gate   (needs everything)       → the one required status check

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin to the version this pipeline was authored/verified against. Bump
  # deliberately (and re-verify `bun test` + `bun run build` locally first).
  BUN_VERSION: "1.3.5"
  # Build-time only — no job here talks to a real Supabase project. Real
  # secrets are injected by Vercel at deploy time (see docs/DEV.md).
  CI_PLACEHOLDER_SUPABASE_URL: "http://127.0.0.1:54321"
  CI_PLACEHOLDER_SUPABASE_ANON_KEY: "ci-placeholder-anon-key"

jobs:
  # ── typecheck + lint + unit ────────────────────────────────────────────
  # bun test here covers tests/unit + tests/invariants for real, and
  # tests/integration too — but DB-gated suites self-skip (no Supabase env
  # in this job; see tests/helpers/supabase.ts `describeWithDb`). e2e specs
  # under tests/e2e self-exclude from `bun test` entirely (see
  # tests/e2e/smoke.spec.ts) — they only run in the playwright job.
  checks:
    name: typecheck + lint + unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Lint (eslint)
        run: bun run lint

      - name: Unit + invariants (+ integration suites, DB-gated tests skip)
        run: bun test

  # ── local Supabase: migrations + RLS matrix as executable spec ─────────
  integration:
    name: supabase local (migrations + RLS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (Docker — preinstalled on ubuntu-latest)
        run: supabase start

      - name: Apply migrations + seed — "migrations apply cleanly" gate
        run: supabase db reset

      - name: Export local Supabase env for tests/helpers/supabase.ts
        run: |
          supabase status -o env > /tmp/supabase-status.env
          api_url=$(grep '^API_URL=' /tmp/supabase-status.env | cut -d= -f2- | tr -d '"')
          anon_key=$(grep '^ANON_KEY=' /tmp/supabase-status.env | cut -d= -f2- | tr -d '"')
          service_key=$(grep '^SERVICE_ROLE_KEY=' /tmp/supabase-status.env | cut -d= -f2- | tr -d '"')
          {
            echo "SUPABASE_URL=$api_url"
            echo "NEXT_PUBLIC_SUPABASE_URL=$api_url"
            echo "SUPABASE_ANON_KEY=$anon_key"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$anon_key"
            echo "SUPABASE_SERVICE_ROLE_KEY=$service_key"
          } >> "$GITHUB_ENV"

      - name: Sanity-check exported env (fail loud, not a silent skip-everything)
        run: |
          test -n "$SUPABASE_URL" || { echo "::error::SUPABASE_URL empty after supabase status -o env parse"; exit 1; }
          test -n "$SUPABASE_ANON_KEY" || { echo "::error::SUPABASE_ANON_KEY empty after supabase status -o env parse"; exit 1; }
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "::error::SUPABASE_SERVICE_ROLE_KEY empty after supabase status -o env parse"; exit 1; }

      - name: RLS matrix + DB-backed suites (real run — env is set)
        run: bun test

  # ── build ────────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [checks, integration]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: bun run build
        run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.CI_PLACEHOLDER_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.CI_PLACEHOLDER_SUPABASE_ANON_KEY }}

  # ── Playwright E2E — desktop-1280 + mobile-360 ─────────────────────────
  playwright:
    name: playwright E2E (desktop + mobile)
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      # The flow specs (login, dashboard, scan, …) sign in as the seeded
      # owner/employee/accountant dev users — the placeholder Supabase env
      # this job used before pointed at a URL nothing was listening on, so
      # every `signInWithPassword` failed and every "log in, wait for
      # /dashboard" helper timed out (root cause of the dashboard-smoke +
      # scan e2e failures). Stand up the same local stack the `integration`
      # job uses, then seed the dev-role auth users before Playwright boots
      # the dev server.
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (Docker — preinstalled on ubuntu-latest)
        run: supabase start

      - name: Apply migrations + seed
        run: supabase db reset

      - name: Export local Supabase env for the app + seed script
        run: |
          supabase status -o env > /tmp/supabase-status.env
          api_url=$(grep '^API_URL=' /tmp/supabase-status.env | cut -d= -f2- | tr -d '"')
          anon_key=$(grep '^ANON_KEY=' /tmp/supabase-status.env | cut -d= -f2- | tr -d '"')
          service_key=$(grep '^SERVICE_ROLE_KEY=' /tmp/supabase-status.env | cut -d= -f2- | tr -d '"')
          {
            echo "SUPABASE_URL=$api_url"
            echo "NEXT_PUBLIC_SUPABASE_URL=$api_url"
            echo "SUPABASE_ANON_KEY=$anon_key"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$anon_key"
            echo "SUPABASE_SERVICE_ROLE_KEY=$service_key"
          } >> "$GITHUB_ENV"

      - name: Sanity-check exported env (fail loud, not a silent skip-everything)
        run: |
          test -n "$SUPABASE_URL" || { echo "::error::SUPABASE_URL empty after supabase status -o env parse"; exit 1; }
          test -n "$SUPABASE_ANON_KEY" || { echo "::error::SUPABASE_ANON_KEY empty after supabase status -o env parse"; exit 1; }
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "::error::SUPABASE_SERVICE_ROLE_KEY empty after supabase status -o env parse"; exit 1; }

      - name: Seed dev-role auth users (owner/employee/accountant) for E2E login
        run: bun run scripts/seed-dev-users.ts

      # Only chromium — both projects (desktop-1280, mobile-360) render via
      # Chromium device profiles (playwright.config.ts). Add browsers here if
      # a project ever needs webkit/firefox.
      - name: Install Playwright browsers + OS deps
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright (webServer boots `bun run dev` on :3000)
        run: bunx playwright test

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test-results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ── CI gate — the one required status check (docs/DEV.md) ─────────────
  gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [checks, integration, build, playwright]
    if: always()
    steps:
      - name: Fail if any required job failed or was cancelled
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required CI jobs failed — red blocks deploy (plan/TESTING.md §1)."
            exit 1
          fi
          echo "All required jobs passed — green build."
